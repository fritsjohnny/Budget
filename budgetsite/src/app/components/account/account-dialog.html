<div class="">
    <form [formGroup]="accountFormGroup">
        <div class="cancel">
            <button
                class="default-button"
                mat-mini-fab
                matTooltip="Cancelar"
                color="accent"
                aria-label="Cancelar"
                (click)="cancel()"
            >
                <mat-icon class="default-icon">close</mat-icon>
            </button>
        </div>

        <div mat-dialog-content>
            <div class="">
                <button
                    class="account-button"
                    [ngClass]="{'line': buttonName === account.name}"
                    mat-button
                    *ngFor="let account of accounts"
                    [ngStyle]="{backgroundColor: account.background, color: account.color}"
                    (click)="setAccount(account)"
                >
                    {{account.name}}
                </button>
                <span
                    class="material-icons add-account"
                    matTooltip="Incluir Conta"
                    matTooltipPosition="above"
                    (click)="addAccount()"
                >
                    add_circle_outline
                </span>
            </div>

            <hr />
            <div class="row">
                <mat-form-field appearance="fill">
                    <mat-label>Nome</mat-label>
                    <input
                        type="text"
                        id="nameFormControl"
                        required
                        matInput
                        formControlName="nameFormControl"
                        cdkFocusInitial
                        (ngModelChange)="onNameChange($event)"
                    />
                    <mat-error
                        *ngIf="accountFormGroup.get('nameFormControl')?.hasError('required')"
                    >
                        Campo <strong>obrigatório</strong>.
                    </mat-error>
                </mat-form-field>
            </div>

            <div class="row">
                <mat-form-field appearance="fill">
                    <mat-label>Nome do Aplicativo</mat-label>
                    <input
                        type="text"
                        id="appPackageNameFormControl"
                        matInput
                        formControlName="appPackageNameFormControl"
                    />
                </mat-form-field>
            </div>

            <div class="row">
                <div class="col-6">
                    <mat-form-field
                        appearance="fill"
                        floatLabel="always"
                        style="width: 100% !important"
                    >
                        <mat-label>Percentual Rendimento</mat-label>
                        <input
                            matInput
                            inputmode="numeric"
                            formControlName="yieldPercentFormControl"
                            placeholder="0"
                            autocomplete="off"
                        />
                    </mat-form-field>
                </div>
                <div class="col-6">
                    <mat-form-field
                        appearance="fill"
                        floatLabel="always"
                        style="width: 100% !important"
                    >
                        <mat-label>Percentual IR</mat-label>
                        <input
                            matInput
                            inputmode="numeric"
                            formControlName="irPercentFormControl"
                            placeholder="0"
                            autocomplete="off"
                        />
                    </mat-form-field>
                </div>
            </div>

            <div class="row">
                <div class="col-6">
                    <mat-form-field
                        appearance="fill"
                        floatLabel="always"
                        style="width: 100% !important"
                    >
                        <mat-label>Saldo Bruto</mat-label>
                        <input
                            matInput
                            inputmode="numeric"
                            currencyMask
                            formControlName="totalBalanceGrossFormControl"
                            placeholder="0"
                            autocomplete="off"
                        />
                    </mat-form-field>
                </div>
            </div>

            <div class="row mat-form-field-wrapper">
                <mat-checkbox formControlName="isTaxExemptFormControl">
                    Insento de IR
                </mat-checkbox>
            </div>

            <div class="row mb-3">
                <div class="col-12 d-flex flex-column">
                    <div>
                        <h3 style="margin: 0">Faixas de rendimento</h3>
                    </div>
                    <div class="align-self-center mb-2">
                        <button
                            class="default-button"
                            color="accent"
                            mat-mini-fab
                            matTooltip="Adicionar faixa"
                            matTooltipPosition="above"
                            aria-label="Adicionar faixa"
                            (click)="addYieldRange()"
                        >
                            <mat-icon>post_add</mat-icon>
                        </button>
                    </div>
                    <div
                        class="row"
                        *ngFor="let range of yieldRanges; let i = index"
                    >
                        <div class="col-4">
                            <mat-form-field
                                appearance="fill"
                                floatLabel="always"
                                style="width: 100% !important"
                            >
                                <mat-label>Valor inicial</mat-label>
                                <input
                                    matInput
                                    inputmode="numeric"
                                    currencyMask
                                    [(ngModel)]="range.startAmount"
                                    [ngModelOptions]="{standalone: true}"
                                    placeholder="0"
                                    autocomplete="off"
                                />
                            </mat-form-field>
                        </div>

                        <div class="col-4">
                            <mat-form-field
                                appearance="fill"
                                floatLabel="always"
                                style="width: 100% !important"
                            >
                                <mat-label>Valor final</mat-label>
                                <input
                                    matInput
                                    inputmode="numeric"
                                    currencyMask
                                    [(ngModel)]="range.endAmount"
                                    [ngModelOptions]="{standalone: true}"
                                    placeholder="Sem limite"
                                    autocomplete="off"
                                />
                            </mat-form-field>
                        </div>

                        <div class="col-3">
                            <mat-form-field
                                appearance="fill"
                                floatLabel="always"
                                style="width: 100% !important"
                            >
                                <mat-label>% CDI</mat-label>
                                <input
                                    matInput
                                    inputmode="numeric"
                                    [(ngModel)]="range.yieldPercent"
                                    [ngModelOptions]="{standalone: true}"
                                    placeholder="100"
                                    autocomplete="off"
                                />
                            </mat-form-field>
                        </div>

                        <div class="col-1 align-self-center">
                            <button
                                type="button"
                                mat-icon-button
                                color="warn"
                                matTooltip="Remover faixa"
                                (click)="removeYieldRange(i)"
                            >
                                <mat-icon>delete</mat-icon>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-6">
                    <mat-form-field
                        appearance="fill"
                        floatLabel="always"
                        style="width: 100% !important"
                    >
                        <mat-label>Cor de fundo</mat-label>
                        <input
                            matInput
                            [ngxMatColorPicker]="picker1"
                            id="backgroundFormControl"
                            formControlName="backgroundFormControl"
                        />
                        <ngx-mat-color-toggle
                            matSuffix
                            [for]="picker1"
                        ></ngx-mat-color-toggle>
                        <ngx-mat-color-picker #picker1></ngx-mat-color-picker>
                        <mat-error
                            *ngIf="accountFormGroup.get('backgroundFormControl')?.hasError('required')"
                        >
                            Campo <strong>obrigatório</strong>.
                        </mat-error>
                    </mat-form-field>
                </div>
                <div class="col-6">
                    <mat-form-field
                        appearance="fill"
                        floatLabel="always"
                        style="width: 100% !important"
                    >
                        <mat-label>Cor do texto</mat-label>
                        <input
                            matInput
                            [ngxMatColorPicker]="picker2"
                            id="colorFormControl"
                            formControlName="colorFormControl"
                        />
                        <ngx-mat-color-toggle
                            matSuffix
                            [for]="picker2"
                        ></ngx-mat-color-toggle>
                        <ngx-mat-color-picker #picker2></ngx-mat-color-picker>
                        <mat-error
                            *ngIf="accountFormGroup.get('colorFormControl')?.hasError('required')"
                        >
                            Campo <strong>obrigatório</strong>.
                        </mat-error>
                    </mat-form-field>
                </div>
            </div>

            <div class="row">
                <p>
                    Posição
                    <span>
                        <input
                            type="number"
                            inputmode="numeric"
                            style="width: 40px !important"
                            onfocus="this.select()"
                            min="1"
                            formControlName="positionFormControl"
                        />
                    </span>
                </p>
            </div>

            <div class="row">
                <mat-checkbox formControlName="disabledFormControl">
                    Desativar conta
                </mat-checkbox>
            </div>

            <div class="row">
                <mat-checkbox formControlName="calcInGeneralFormControl">
                    Contabilizar no saldo geral
                </mat-checkbox>
            </div>

            <div class="center">
                <button
                    class="account-button"
                    mat-button
                    [class.has-parens]="hasParens"
                    [ngStyle]="{
                      backgroundColor: accountFormGroup.get('backgroundFormControl')?.value, 
                      color: accountFormGroup.get('colorFormControl')?.value
                      }"
                >
                    {{buttonText}}
                </button>
            </div>
        </div>

        <div class="row">
            <div class="col">
                <div mat-dialog-actions>
                    <button
                        [disabled]="!accountFormGroup.valid"
                        class="default-button"
                        mat-mini-fab
                        matTooltip="Salvar"
                        matTooltipPosition="right"
                        class="bg-primary"
                        aria-label="Salvar"
                        [mat-dialog-close]="accounts"
                        (click)="save()"
                    >
                        <mat-icon class="default-icon">save</mat-icon>
                    </button>
                </div>
            </div>
            <div class="col" *ngIf="id">
                <div mat-dialog-actions>
                    <button
                        class="default-button"
                        mat-mini-fab
                        matTooltip="Excluir"
                        matTooltipPosition="left"
                        color="warn"
                        aria-label="Excluir"
                        (click)="delete()"
                    >
                        <mat-icon class="default-icon">delete</mat-icon>
                    </button>
                </div>
            </div>
        </div>
    </form>
</div>
